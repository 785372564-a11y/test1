# 分析参数
analysis:
  # 历史 K 线天数 (用于计算 MA/RSI/MACD)
  lookback_days: 120
  # 移动均线周期
  ma_periods: [5, 10, 20, 60]
  # RSI 周期
  rsi_period: 14
  # 信号阈值
  rsi_oversold: 30
  rsi_overbought: 70
  # 涨跌幅警示阈值 (绝对值百分比)
  change_alert_pct: 5.0

# 飞书推送
feishu:
  # 卡片标题
  title: "📊 每日股票分析报告"
  # 卡片主题色: blue / red / green / orange / grey / turquoise / purple / wathet / indigo / yellow / carmine
  card_color: "blue"
