name: Daily Stock Analysis

on:
  schedule:
    # 每个交易日 北京时间 16:00 (UTC 08:00) — A 股收盘后
    - cron: '0 8 * * 1-5'
    # 每个交易日 北京时间次日 05:30 (UTC 21:30) — 美股收盘后
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

jobs:
  push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily_stock_analysis
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: daily_stock_analysis/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run analysis & push to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
        run: python main.py
